train_csv: ${oc.env:MOF_TRAIN_CSV}
test_csv: ${oc.env:MOF_TEST_CSV}
construction_dir: ${oc.env:MOF_CONSTRUCTION_DIR}    # xyz BBs + alias CSVs (Ball 2026 USMOF_construction/)
cifs_dir: ${oc.env:MOF_CIF_DIR}                     # local dir where PORMAKE-built CIFs are written
chemfile_dir: ${oc.env:MOF_CHEMFILE_DIR}            # local parquet output dir (data/train.parquet)
hf_dataset: ${oc.env:MOF_HF_DATASET,null}           # optional; if set, upload chemfile_dir/ -> repo data/

# Build knobs (passed to build_usmof_cifs._build_one)
num_workers: 16
skip_existing: false                                # default false: re-build everything so every kept row has clustering
rmsd_warn_threshold: 0.3

hydra:
  run:
    dir: ${oc.env:MOF_LOG_PATH}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${oc.env:MOF_LOG_PATH}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
